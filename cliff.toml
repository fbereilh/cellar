# cliff.toml - git-cliff configuration for Cellar's CHANGELOG.md.
#
# CHANGELOG.md is generated from the git history (Conventional Commits + tags),
# NOT hand-maintained. Regenerate with `make changelog` (or `npx git-cliff -o
# CHANGELOG.md`). See RELEASING.md.
#
# Config reference: https://git-cliff.org/docs/configuration

[changelog]
# A fixed header marking the file as generated, so nobody edits it by hand.
header = """
# Changelog

All notable changes to Cellar, grouped by release.

<!--
  AUTO-GENERATED by git-cliff from the git history - DO NOT EDIT BY HAND.
  Regenerate with `make changelog`. Config lives in cliff.toml.
-->\n
"""
# One section per release tag, newest first (releases are iterated in reverse).
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}]{% if timestamp %} - {{ timestamp | date(format="%Y-%m-%d") }}{% endif %}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first | trim }}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
# Map commit types to changelog sections. Order here controls section order.
commit_parsers = [
  # Tooling/version-bump/merge noise never belongs in the changelog.
  { message = "^chore\\(changelog\\)", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^Merge (pull request|branch|remote-tracking)", skip = true },
  { message = "^\\d+\\.\\d+\\.\\d+$", skip = true },

  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  # Cellar's `no-mistakes(document)` commits are documentation.
  { message = "^no-mistakes\\(document\\)", group = "<!-- 4 -->Documentation" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  # `no-mistakes(review)` = review-driven follow-ups; group with fixes.
  { message = "^no-mistakes\\(review\\)", group = "<!-- 1 -->Bug Fixes" },
  { message = "^(chore|ci|build|test|style|no-mistakes)", group = "<!-- 5 -->Miscellaneous" },
  { message = ".*", group = "<!-- 5 -->Miscellaneous" },
]
# Only real version tags define releases (ignore `rejected-approach` etc.).
tag_pattern = "v[0-9]*"
sort_commits = "oldest"

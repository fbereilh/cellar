name: docker-publish

# Build + push the Cellar Docker image to GitHub Container Registry (GHCR).
#
# Runs on a `v*` release tag (alongside release.yml) and on manual dispatch.
# Auth uses the built-in GITHUB_TOKEN (packages: write) — no external secret to
# configure — so the image publishes to ghcr.io/<owner>/cellar with no extra
# setup. Manual `docker build` / `docker push` also works (see README).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v1.2.3 or latest)"
        required: false
        type: string

concurrency:
  group: docker-publish-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr.io/<owner>/cellar, lowercased. Tags: the version (on a v* tag) and
      # `latest`; the git sha is baked in for `cellar --version`.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cellar
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CELLAR_BUILD_SHA=${{ github.sha }}
            CELLAR_BUILD_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

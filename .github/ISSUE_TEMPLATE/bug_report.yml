name: Bug report
description: Report something in Cellar that isn't working as expected.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill in as much as you can - the
        version and environment details make bugs far faster to reproduce.

        For **security** issues, do **not** file a public issue - see
        [SECURITY.md](https://github.com/fbereilh/cellar/blob/main/SECURITY.md).

  - type: textarea
    id: version
    attributes:
      label: Cellar version
      description: Paste the full output of `cellar --version`.
      placeholder: |
        $ cellar --version
        ...
      render: shell
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      description: How did you install Cellar?
      options:
        - Homebrew (stable, brew install cellar)
        - Homebrew (--HEAD)
        - Docker
        - From source (git clone / make setup)
        - Other (describe below)
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: Where does the bug show up? (pick all that apply)
      multiple: true
      options:
        - UI (browser / notebook)
        - Kernel / execution
        - MCP (agent interface)
        - Databricks
        - Launcher / CLI
        - Other / not sure
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15.5 (arm64), Ubuntu 24.04, Windows 11 + WSL2
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`. (N/A if you only run the Docker image.)
      placeholder: e.g. v20.11.0
    validations:
      required: false

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: The kernel interpreter, e.g. `python3 --version` or the project venv's Python.
      placeholder: e.g. Python 3.11.9
    validations:
      required: false

  - type: input
    id: uv-version
    attributes:
      label: uv version
      description: Output of `uv --version`. (N/A for the Docker image.)
      placeholder: e.g. uv 0.5.11
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps that trigger the bug.
      placeholder: |
        1. Run `cellar` in a folder with ...
        2. Add a cell that ...
        3. Run it / click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages, tracebacks, or terminal/console output.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, a minimal notebook, relevant environment variables, or other context.
    validations:
      required: false
